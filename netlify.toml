# netlify.toml — Netlify configuration
# Controls caching, build settings, and headers

[build]
  publish = "frontend"      # Serve files from the frontend/ folder

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"